substitutions:
  area: "lounge"
  node_id: "lounge-airquality-sensor"
  friendly_name: "AirQuality Sensor"
  # PINS ASSIGNED
  green_led_pin: GPIO12
  red_orange_led_pin: GPIO13
  fan_mosfet_pin: GPIO14
  # INPUT PINS
  photodiode_pin: GPIO36

esphome:
  area: "${area}"
  name: "${node_id}"
  friendly_name: ${friendly_name}

  on_boot:
    then:
      - script.execute: status_blink_fast

esp32:
  board: lolin_s2_mini
  variant: esp32s2
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  output_power: 20.5dB
  on_connect:
    then:
      - script.stop: status_blink_fast
      - light.turn_on: status_led

api:

web_server:
  port: 80

# ----------------------------------------------------
# 1. OUTPUT DEFINITIONS
# ----------------------------------------------------
output:
  - platform: gpio
    id: status_output
    pin:
      number: GPIO15

  - platform: gpio
    id: green_led_output
    pin: ${green_led_pin}

  - platform: gpio
    id: red_orange_led_output
    pin: ${red_orange_led_pin}

# ----------------------------------------------------
# 2. FAN SWITCH & DEBUG SWITCHES
# ----------------------------------------------------
switch:
  # Fan MOSFET Control (GPIO 14)
  - platform: gpio
    pin: ${fan_mosfet_pin}
    id: fan_switch
    name: "${friendly_name} Fan"
    restore_mode: ALWAYS_OFF # Safety first for a fan

  # DEBUG SWITCHES (Exposed in Home Assistant)
  - platform: template
    name: "${friendly_name} Debug Green LED"
    id: debug_green_led_switch
    turn_on_action:
      - light.turn_on: green_led
      - light.turn_off: red_orange_led
    turn_off_action:
      - light.turn_off: green_led

  - platform: template
    name: "${friendly_name} Debug Orange LED"
    id: debug_orange_led_switch
    turn_on_action:
      - light.turn_on: red_orange_led # GPIO13 HIGH = ORANGE
      - light.turn_off: green_led
    turn_off_action:
      - light.turn_off: red_orange_led

  - platform: template
    name: "${friendly_name} Debug Red LED"
    id: debug_red_led_switch
    turn_on_action:
      - light.turn_off: red_orange_led # GPIO13 LOW = RED
      - light.turn_off: green_led
    turn_off_action:
      # Briefly toggle HIGH then back to LOW/OFF state
      - light.turn_on: red_orange_led
      - light.turn_off: red_orange_led

# ----------------------------------------------------
# 3. IMMEDIATE READ BUTTON
# ----------------------------------------------------
button:
  - platform: template
    name: "${friendly_name} Read Air Quality Now"
    id: read_now_button
    on_press:
      - script.execute: read_and_set_pm_status

# ----------------------------------------------------
# 4. LIGHT COMPONENTS
# ----------------------------------------------------
light:
  # Onboard LED
  - platform: binary
    id: status_led
    name: "${device_location} Status LED"
    output: status_output

  # Status LEDs
  - platform: binary
    id: green_led
    name: "Green LED Status"
    output: green_led_output

  - platform: binary
    id: red_orange_led
    name: "Red/Orange LED Control Pin"
    output: red_orange_led_output

# ----------------------------------------------------
# 5. I2C/UART CONFIGURATIONS
# ----------------------------------------------------
i2c:
  sda: GPIO33
  scl: GPIO21
  frequency: 50kHz

uart:
  id: uart_vindriktning
  rx_pin: GPIO05
  tx_pin: GPIO04
  baud_rate: 9600
  parity: none
  stop_bits: 1

# ----------------------------------------------------
# 6. SENSOR DEFINITIONS
# ----------------------------------------------------
sensor:
  # BME280
  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "Temperature"
      id: ${ha_name}_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
    pressure:
      name: "Air Pressure"
      id: pressure
      unit_of_measurement: "hPa"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
    humidity:
      name: "Humidity"
      id: "humidity"
      unit_of_measurement: "%"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
    update_interval: 60s

  # PM1006 (VINDRIKTNING)
  - platform: pm1006
    uart_id: uart_vindriktning
    pm_2_5:
      name: "PM2.5"
      id: "air_quality"
      unit_of_measurement: "µg/m³"
      state_class: measurement
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 5
      on_value: # Added detailed logger for debugging the sensor value
        - logger.log:
            format: "PM2.5 Value Updated: %.2f µg/m³"
            args: ["id(air_quality).state"]
    update_interval: 10s

# ----------------------------------------------------
# 7. BINARY SENSOR (LD2410)
# ----------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
    name: "${device_location} Radar Presence"
    device_class: presence
    filters:
      - delayed_on: 250ms
      - delayed_off: 250ms

# ----------------------------------------------------
# 8. TIME AND INTERVAL AUTOMATION (30-Minute Check)
# ----------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Sydney
    update_interval: 1h

interval:
  - interval: 30min
    then:
      - script.execute: read_and_set_pm_status

# ----------------------------------------------------
# 9. SCRIPTS (The Core Logic)
# ----------------------------------------------------
script:
  # Status LED Blinking
  - id: status_blink_fast
    mode: restart
    then:
      - light.turn_on: status_led
      - delay: 100ms
      - light.turn_off: status_led
      - delay: 400ms
      - script.execute: status_blink_fast

  # Main PM2.5 Reading and LED Setting Script
  - id: read_and_set_pm_status
    then:
      - logger.log: "Starting air quality check cycle."
      # Step 1: Turn the Fan ON (Necessary for VINDRIKTNING sensor)
      - switch.turn_on: fan_switch

      # Step 2: Delay for Fan and Sensor Stabilization
      - delay: 30s

      # Step 3: Force the sensor to report its current (fresh) reading
      - lambda: id(air_quality).publish_state(id(air_quality).state);

      # Step 4: Logic to Set LED Color
      - light.turn_off: green_led # Clear Green state

      # Green (Normal: PM2.5 < 12.0)
      - if:
          condition:
            lambda: "return id(air_quality).has_state() && id(air_quality).state < 12.0;"
          then:
            - light.turn_on: green_led
            - light.turn_off: red_orange_led # GPIO13 LOW
            - logger.log: "Air Quality: NORMAL (< 12.0)"

      # Orange (Moderate: 12.0 <= PM2.5 < 35.5)
      - if:
          condition:
            lambda: "return id(air_quality).has_state() && id(air_quality).state >= 12.0 && id(air_quality).state < 35.5;"
          then:
            - light.turn_on: red_orange_led # GPIO13 HIGH (Orange)
            - logger.log: "Air Quality: MODERATE (12.0 - 35.5)"

      # Red (High: PM2.5 >= 35.5)
      - if:
          condition:
            lambda: "return id(air_quality).has_state() && id(air_quality).state >= 35.5;"
          then:
            - light.turn_off: red_orange_led # GPIO13 LOW (Red)
            - logger.log: "Air Quality: HIGH (>= 35.5)"

      # Step 5: Turn Fan OFF
      - switch.turn_off: fan_switch
      - logger.log: "Air quality check complete. Fan turned OFF."

# ----------------------------------------------------
# 10. LOGGER & OTA
# ----------------------------------------------------
logger:
  level: DEBUG

ota:
  platform: esphome
