# --- Hardware & Connectivity ---

esp8266:
  board: esp8285
  restore_from_flash: true
  early_pin_init: true

api:

ota:
  - platform: esphome

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80

wifi:
  # Use global Wi-Fi credentials (these can be moved to secrets.yaml for better security)
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: NONE
  ap: {}

captive_portal:

# --- Components ---

# Basic switch relay (The actual output control)
switch:
  - platform: gpio
    name: ${relay_name}
    pin: GPIO12
    id: ${relay_id}
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:power-socket-us

# Status LED (The component we are manually controlling)
light:
  - platform: status_led
    name: "Status LED"
    id: blue_led
    icon: mdi:lightbulb-outline
    internal: true
    pin:
      inverted: true
      number: GPIO13

# Physical Button Control (Retained)
binary_sensor:
  - platform: gpio
    pin:
      number: 5
      mode: INPUT_PULLUP
      inverted: true
    id: power_button
    name: "Power Button"
    disabled_by_default: true
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - switch.toggle: ${relay_id}
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

# Physical Reset/Safe Mode Buttons (Retained)
button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config
