substitutions:
  area: "Garage"
  name: "garage-hall-sensor"
  friendly_name: "Garage Hall Sensor"

  # PINS ASSIGNED
  pir_output_pin: GPIO27
  onboard_led_pin: GPIO2

# ====================================================
# 1. CORE SYSTEM CONFIGURATION
# ====================================================
esphome:
  area: "${area}"
  name: "${name}"
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: arduino

logger:
  level: DEBUG

ota:
  platform: esphome

api:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Sydney
    update_interval: 1h

# ====================================================
# 2. CONNECTIVITY & STATUS INDICATOR
# ====================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  ap: {}

captive_portal:

# Automatically handles connectivity blinking patterns
status_led:
  pin: ${onboard_led_pin}

# ====================================================
# 3. BINARY SENSORS (PIR & RADAR TARGETS)
# ====================================================
binary_sensor:
  # PIR Hardware Sensor
  - platform: gpio
    pin:
      number: ${pir_output_pin}
      mode: INPUT_PULLDOWN
    name: "PIR"
    device_class: motion
