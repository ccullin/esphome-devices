substitutions:
  area: "Garage"
  name: "garage-sensor"
  friendly_name: "Garage Sensor"

  # PINS ASSIGNED
  pir_output_pin: GPIO27
  uart_rx_pin: GPIO16
  uart_tx_pin: GPIO17
  onboard_led_pin: GPIO2

# ====================================================
# 1. CORE SYSTEM CONFIGURATION
# ====================================================
esphome:
  area: "${area}"
  name: "${name}"
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: DEBUG

ota:
  platform: esphome

api:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Sydney
    update_interval: 1h

# ====================================================
# 1. BLUETOOTH PROXY FOR YALE FRONT DOOR
# ====================================================
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

# ====================================================
# 2. CONNECTIVITY & STATUS INDICATOR
# ====================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  ap: {}

captive_portal:

# Automatically handles connectivity blinking patterns
status_led:
  pin: ${onboard_led_pin}

# ====================================================
# 3. BINARY SENSORS (PIR & RADAR TARGETS)
# ====================================================
binary_sensor:
  # PIR Hardware Sensor
  # - platform: gpio
  #   pin:
  #     number: ${pir_output_pin}
  #     mode: INPUT_PULLDOWN
  #   name: "PIR"
  #   device_class: motion

  # LD2410 Detection Targets
  - platform: ld2410
    has_target:
      name: "uWave Presence"
    # has_moving_target:
    #   name: "uWave Motion"
    # has_still_target:
    #   name: "uWave Still Presence"

# ====================================================
# 4. LD2410 RADAR: CORE SETUP
# ====================================================
uart:
  - id: uart_ld2410
    rx_pin: ${uart_rx_pin}
    tx_pin: ${uart_tx_pin}
    baud_rate: 256000
    parity: none
    stop_bits: 1

ld2410:
  id: my_ld2410
  uart_id: uart_ld2410

# ====================================================
# 5. LD2410 RADAR: DIAGNOSTICS & TUNING
# ====================================================

# Energy Sensors (per gate)
sensor:
  - platform: ld2410
    g0:
      move_energy: { name: "G0 Move" }
      still_energy: { name: "G0 Still" }
    g1:
      move_energy: { name: "G1 Move" }
      still_energy: { name: "G1 Still" }
    g2:
      move_energy: { name: "G2 Move" }
      still_energy: { name: "G2 Still" }
    g3:
      move_energy: { name: "G3 Move" }
      still_energy: { name: "G3 Still" }
    g4:
      move_energy: { name: "G4 Move" }
      still_energy: { name: "G4 Still" }
    g5:
      move_energy: { name: "G5 Move" }
      still_energy: { name: "G5 Still" }
    g6:
      move_energy: { name: "G6 Move" }
      still_energy: { name: "G6 Still" }
    g7:
      move_energy: { name: "G7 Move" }
      still_energy: { name: "G7 Still" }
    g8:
      move_energy: { name: "G8 Move" }
      still_energy: { name: "G8 Still" }

# Management & Tuning
button:
  - platform: ld2410
    factory_reset: { name: "LD2410 Factory Reset" }
    restart: { name: "LD2410 Restart" }
    query_params: { name: "LD2410 Query Params" }

switch:
  - platform: ld2410
    engineering_mode: { name: "LD2410 Engineering Mode" }

number:
  - platform: ld2410
    timeout: { name: "LD2410 Presence Timeout" }
    max_move_distance_gate: { name: "LD2410 Max Move Distance" }
    max_still_distance_gate: { name: "LD2410 Max Still Distance" }
    g0:
      move_threshold: { name: "G0 Move Threshold" }
      still_threshold: { name: "G0 Still Threshold" }
    g1:
      move_threshold: { name: "G1 Move Threshold" }
      still_threshold: { name: "G1 Still Threshold" }
    g2:
      move_threshold: { name: "G2 Move Threshold" }
      still_threshold: { name: "G2 Still Threshold" }

select:
  - platform: ld2410
    distance_resolution: { name: "LD2410 Distance Resolution" }
