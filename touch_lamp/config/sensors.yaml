# config/sensors.yaml

#TOUCH SENSOR
esp32_touch:
  setup_mode: false
  # iir_filter: 10ms

binary_sensor:
  - platform: esp32_touch
    id: lamp_touch_sensor
    pin: GPIO32
    threshold: 1000
    wakeup_threshold: 200

    on_press:
      then:
        - lambda: |-
            id(press_start_time) = millis();
            id(last_user_event_time) = millis();
            ESP_LOGD("touch_control", "Touch press started at %lu ms.", id(press_start_time));
        - homeassistant.event:
            event: esphome.touch_pressed

    on_release:
      then:
        - lambda: |-
            uint32_t press_duration = millis() - id(press_start_time);
            ESP_LOGD("touch_control", "Touch released after %lu ms.", press_duration);

            if (press_duration < 1000) { // Short press (less than 1 second)
              ESP_LOGD("touch_control", "Short press detected. Cycling brightness.");

              std::vector<float> brightness_levels = {0.0, 0.50, 0.75, 1.00};
              std::vector<std::string> mode_names = {"Off", "Low", "Medium", "High"};
              int current_index = id(current_brightness_index);

              // Cycle through the brightness levels
              current_index = (current_index + 1) % brightness_levels.size();
              id(current_brightness_index) = current_index;

              float new_brightness = brightness_levels[current_index];
              id(lamp2).turn_on().set_brightness(new_brightness).perform();
              id(lamp_brightness_mode).publish_state(mode_names[current_index]);
            }

        # } else { // Long press (1 second or more)
        #   ESP_LOGD("touch_control", "Long press detected. Firing Home Assistant event.");
        #   id(long_press_detected).execute();
        # }

  # USB DETECT.  LOW WHEN USB CONNECTED
  - platform: gpio
    name: "detected USB"
    id: detected_usb
    # internal: true
    pin:
      number: GPIO15
      mode:
        input: true
        pulldown: true # this ensures battery is default unless USB definitively connected.
      # allow_other_uses: true
      inverted: true
    on_state:
      then:
        - lambda: "id(last_user_event_time) = millis();"
        - logger.log: "DEBUG: User event (USB state change) detected. Resetting sleep timer."

# Sleep state text sensor for Home Assistant
text_sensor:
  - platform: template
    name: "Lamp Sleep State"
    id: lamp_sleep_state
    icon: mdi:sleep
    on_value:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: text_sensor.lamp_sleep_state

# A SENSOR TO MONITOR THE TOUCH SENSOR AND FIRE OFF EVENTS ON LONG HOLD
sensor:
  - platform: template
    name: "Touch Timer"
    update_interval: 1s # Check every second
    lambda: |-
      return id(lamp_touch_sensor).state ? (millis() - id(press_start_time)) / 1000.0 : 0.0;
    on_value:
      # This is the key part that fires the repeating event.
      then:
        - if:
            condition:
              lambda: "return id(lamp_touch_sensor).state && (millis() - id(press_start_time)) >= 1000;"
            then:
              - script.execute: long_press_detected

# Select entity for brightness levels
select:
  - platform: template
    name: "Lamp Brightness Mode" # Name visible in Home Assistant
    id: lamp_brightness_mode # Unique ID for this select entity
    options: # These are the options HA will see
      - "Off"
      - "Low"
      - "Medium"
      - "High"
    restore_value: false # Remember the last selected mode across reboots
    initial_option: "Off" # Default value on first boot
    optimistic: false # Set this explicitly to false

    # Use set_action to handle incoming commands for this select entity
    set_action:
      then:
        - lambda: |-
            // The value sent from Home Assistant is available as 'x' (std::string)
            // Map the selected string to our brightness index
            int new_index = 0;
            if (x == "Low") {
              new_index = 1;
            } else if (x == "Medium") {
              new_index = 2;
            } else if (x == "High") {
              new_index = 3;
            }
            id(current_brightness_index) = new_index; // Update our global index

            // Set the lamp brightness based on the new index
            std::vector<float> brightness_levels = {0.0, 0.50, 0.75, 1.00};
            float new_brightness = brightness_levels[new_index];
            id(lamp2).turn_on().set_brightness(new_brightness).perform();

            // Publish the state back to the select entity itself, confirming the change
            // This is crucial when optimistic: false
            id(lamp_brightness_mode).publish_state(x);

            ESP_LOGD("brightness_mode", "HA set brightness mode to %s. New index: %d, brightness: %.2f", x.c_str(), new_index, new_brightness);

script:
  - id: long_press_detected
    then:
      - homeassistant.event:
          event: esphome.long_press_lamp
      - logger.log: "Long press detected. Firing Home Assistant event."
