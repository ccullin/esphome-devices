esphome:
  name: debug_ultra_barebones
  includes:
    - <esp_sleep.h>
  platformio_options:
    platform:
      - https://github.com/platformio/platform-espressif32.git
    platform_packages:
      - pioarduino/framework-espidf@https://github.com/pioarduino/esp-idf/releases/download/v5.5.0.20250510/esp-idf-v5.5.0.zip

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: 5.4.1

# external_components:
#   - source: custom_components
#     components: [ledc_sleep]

output:
  - platform: ledc_sleep
    pin: GPIO2 # Standard onboard LED pin for many ESP32 dev boards
    id: onboard_led_output
    frequency: 500Hz
    resolution: 10
    clk_cfg: RC_FAST_CLK
    sleep_mode: KEEP_ALIVE

light:
  - platform: binary
    output: onboard_led_output
    name: "Onboard LED"
    id: onboard_led
    restore_mode: RESTORE_DEFAULT_ON

script:
  - id: enter_light_sleep_script
    then:
      - lambda: |-
          esp_light_sleep_start();
      - light.turn_off: onboard_led # Turn LED on to confirm wakeup (runs after lambda returns)

interval:
  - interval: 20s
    then:
      - script.execute: enter_light_sleep_script
