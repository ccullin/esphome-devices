# touch_lamp.yaml

substitutions:
  area: "lounge"
  node_id: "lounge-touch-lamp"
  friendly_name: "Touch Lamp"

esphome:
  area: "${area}"
  name: "${node_id}"
  friendly_name: ${friendly_name}
  # platformio_options:
  # platform:
  #   - https://github.com/platformio/platform-espressif32.git
  # platform_packages:
  #   - pioarduino/framework-espidf@https://github.com/pioarduino/esp-idf/releases/download/v5.5.0.20250510/esp-idf-v5.5.0.zip
  on_boot:
    # The 'then' block defines the actions to be performed on every device boot
    then:
      - logger.log: "Setting initial brightness to medium on boot"
      - globals.set:
          id: current_brightness_index
          value: "1" # Sets the brightness index to 1 (medium) on boot
      - logger.log: "Startup: Device is now awake. Setting sleep state sensor."
      - text_sensor.template.publish:
          id: lamp_sleep_state
          state: "Awake"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: 5.5.0

external_components:
  - source: custom_components
    # components: [ledc_sleep]
    components: [ledc_sleep, light_sleep]

logger:
  level: VERBOSE
  # initial_level: INFO
  logs:
    wifi: DEBUG
    deep_sleep: DEBUG
    light_sleep: DEBUG
    light: DEBUG
    sensor: WARN
    esp32_preferences: VERBOSE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: NONE
  output_power: 20.5db
  ap: {}

captive_portal:

api: # If you use Home Assistant API

ota: # For over-the-air updates
  - platform: esphome
    id: my_ota
    on_progress:
      then:
        - logger.log: "OTA start"
        - deep_sleep.prevent: lamp_deep_sleep
        - light_sleep.prevent: lamp_light_sleep
        - globals.set:
            id: is_ota_active_flag
            value: "true"
        # - lambda: id(is_ota_active_flag) = true;
    on_end:
      then:
        - logger.log: "OTA completed"
        - deep_sleep.allow: lamp_deep_sleep
        - light_sleep.allow: lamp_light_sleep
        - globals.set:
            id: is_ota_active_flag
            value: "false"
        # - lambda: id(is_ota_active_flag) = false;

globals:
  - id: current_brightness_index # Unique ID for the global variable
    type: int # We'll store an integer (0, 1, or 2)
    initial_value: "1" # Start at the lowest brightness level (index 0) on first boot
  - id: is_ota_active_flag
    type: bool
    initial_value: "false" # Default to false (OTA not active)
  - id: press_start_time
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: last_user_event_time
    type: uint32_t
    restore_value: false
    initial_value: "0"

# Include all other sections
packages:
  light_pkg: !include config/light.yaml # config for light pin and sensor
  sensor_pkg: !include config/sensors.yaml # everything related to the touch sensor
  sleep_pkg: !include config/sleep.yaml # usb power detection.  no usb means battery

