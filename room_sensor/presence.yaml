substitutions:
  area: "lounge"
  node_id: "lounge-room-sensor"
  friendly_name: "Room Sensor"

esphome:
  area: "${area}"
  name: "${node_id}"
  friendly_name: ${friendly_name}

esp32:
  board: lolin_s2_mini
  variant: esp32s2
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  # output_power: 20.5dB
  ap: {}

captive_portal:

web_server:
  port: 80

api:

# ----------------------------------------------------
# 2. DEBUG SWITCHES
# ----------------------------------------------------
switch:
  # LD2410 Engineering Mode Switch
  - platform: ld2410
    engineering_mode:
      name: "Engineering Mode"
# ----------------------------------------------------
# 3. IMMEDIATE READ BUTTON
# ----------------------------------------------------
button:
  - platform: ld2410
    factory_reset:
      name: Factory reset
    restart:
      name: Restart
    query_params:
      name: Query params

# ----------------------------------------------------
# 5. I2C/UART CONFIGURATIONS
# ----------------------------------------------------
i2c:
  sda: GPIO33
  scl: GPIO21
  frequency: 50kHz

uart:
  - id: uart_pm25
    rx_pin: GPIO05
    tx_pin: GPIO04
    baud_rate: 9600
    parity: none
    stop_bits: 1

  - id: uart_ld2410
    rx_pin: GPIO16 # Connect to LD2410 TX pin
    tx_pin: GPIO17 # Connect to LD2410 RX pin
    baud_rate: 256000 # LD2410 uses 256000 baud
    parity: none
    stop_bits: 1

# ----------------------------------------------------
# 6. SENSOR DEFINITIONS
# ----------------------------------------------------
sensor:
  # BME280
  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "Temperature"
      id: temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
        - offset: -3
    pressure:
      name: "Air Pressure"
      id: pressure
      unit_of_measurement: "hPa"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
    humidity:
      name: "Humidity"
      id: "humidity"
      unit_of_measurement: "%"
      accuracy_decimals: 1
      oversampling: 16x
      state_class: measurement
      filters:
        - throttle: 5min
    update_interval: 60s

  - platform: ld2410
    g0:
      move_energy: { name: "G0 Move" }
      still_energy: { name: "G0 Still" }
    g1:
      move_energy: { name: "G1 Move" }
      still_energy: { name: "G1 Still" }
    g2:
      move_energy: { name: "G2 Move" }
      still_energy: { name: "G2 Still" }
    g3:
      move_energy: { name: "G3 Move" }
      still_energy: { name: "G3 Still" }
    g4:
      move_energy: { name: "G4 Move" }
      still_energy: { name: "G4 Still" }
    g5:
      move_energy: { name: "G5 Move" }
      still_energy: { name: "G5 Still" }
    g6:
      move_energy: { name: "G6 Move" }
      still_energy: { name: "G6 Still" }
    g7:
      move_energy: { name: "G7 Move" }
      still_energy: { name: "G7 Still" }
    g8:
      move_energy: { name: "G8 Move" }
      still_energy: { name: "G8 Still" }

# ----------------------------------------------------
# 7. LD2410 presence sensor
# ----------------------------------------------------
ld2410:
  id: my_ld2410
  uart_id: uart_ld2410
  # thresholds:
  #   - gate: 0
  #     move_threshold: 100
  #     still_threshold: 100
  #   - gate: 1
  #     move_threshold: 100
  #     still_threshold: 100
  #   - gate: 2
  #     move_threshold: 50
  #     still_threshold: 40
  #   - gate: 3
  #     move_threshold: 50
  #     still_threshold: 40
  #   - gate: 4
  #     move_threshold: 40
  #     still_threshold: 30
  #   - gate: 5
  #     move_threshold: 40
  #     still_threshold: 30
  #   # Gates 6-8 will use factory defaults unless specified

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence"
    has_moving_target:
      name: "Motion"
    has_still_target:
      name: "Still Presence"
    out_pin_presence_status:
      name: "pin presence"

# ----------------------------------------------------
# 8. LD2410 Tuning Controls
# ----------------------------------------------------
number:
  # create slider bars on Home Assistant
  - platform: ld2410
    timeout:
      name: "Presence Timeout"
    max_move_distance_gate:
      name: "Max Move Distance"
    max_still_distance_gate:
      name: "Max Still Distance"
    g0:
      move_threshold:
        name: "G0 Move threshold"
      still_threshold:
        name: "G0 Still Threshold"
    g1:
      move_threshold:
        name: "G1 Move Threshold"
      still_threshold:
        name: "G1 Still Threshold"
    g2:
      move_threshold:
        name: "G2 Move Threshold"
      still_threshold:
        name: "G2 Still Threshold"

# 3. Select Config
select:
  - platform: ld2410
    distance_resolution:
      name: "Distance Resolution"

# old LD2410 on/off config
# binary_sensor:
#   - platform: gpio
#     pin:
#       number: GPIO18
#     name: "${device_location} Radar Presence"
#     device_class: presence
#     filters:
#       - delayed_on: 250ms
#       - delayed_off: 250ms

# ----------------------------------------------------
# 8. TIME AND INTERVAL AUTOMATION (30-Second LED Test)
# ----------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: Australia/Sydney
    update_interval: 1h

# ----------------------------------------------------
# 10. LOGGER & OTA
# ----------------------------------------------------
logger:
  level: INFO # This is your default global log level

ota:
  platform: esphome
